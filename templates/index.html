<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Repo Editor · enhanced</title>
  <!-- Bootstrap 5 + icons (optional but nice) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #f4f6f9; }
    .repo-listbox { min-height: 320px; }
    .directory-card { max-height: 380px; overflow-y: auto; }
    .file-item, .folder-summary { cursor: pointer; transition: background 0.1s ease; }
    .file-item:hover, .folder-summary:hover { background-color: #e9ecef; }
    .badge-copy { cursor: pointer; }
    .editor-footer { background: #f8fafc; }
    .mono { font-family: 'SF Mono', 'Fira Code', monospace; }
  </style>
</head>
<body>

<div class="container-fluid py-4 px-lg-4">
  <!-- top header with fake "copy repo url" demo (no backend needed) -->
  <div class="d-flex flex-wrap align-items-center justify-content-between mb-3">
    <h2 class="h4 fw-semibold text-dark"><i class="bi bi-github me-2"></i>GitHub editor</h2>
    <div class="d-flex gap-2">
      <input type="text" class="form-control form-control-sm w-auto bg-white" placeholder="owner/repo" id="quickRepoUrl" value="octocat/Hello-World">
      <button class="btn btn-outline-secondary btn-sm" id="copyQuickRepoBtn" title="Copy to clipboard"><i class="bi bi-clipboard"></i> copy</button>
    </div>
  </div>

  <div class="row g-4">
    <!-- LEFT PANEL: repositories + pagination + quick actions -->
    <div class="col-lg-3">
      <div class="card shadow-sm border-0 h-100">
        <div class="card-header bg-white border-0 pt-3 pb-0">
          <div class="d-flex align-items-center justify-content-between">
            <h5 class="fw-semibold mb-0"><i class="bi bi-collection me-1"></i> Repositories</h5>
            <button class="btn btn-sm btn-outline-primary" id="refreshReposBtn"><i class="bi bi-arrow-repeat"></i></button>
          </div>
        </div>
        <div class="card-body pt-2">
          <select id="repoSelect" size="10" class="form-select form-select-sm repo-listbox bg-white border rounded-3"></select>

          <div class="d-flex justify-content-between align-items-center mt-3">
            <button id="prevPage" class="btn btn-outline-secondary btn-sm"><i class="bi bi-chevron-left"></i> Prev</button>
            <span id="pageLabel" class="fw-semibold small">Page 1</span>
            <button id="nextPage" class="btn btn-outline-secondary btn-sm">Next <i class="bi bi-chevron-right"></i></button>
          </div>

          <!-- extra copy repo full name (selected) -->
          <div class="mt-3 d-grid gap-2">
            <button class="btn btn-light btn-sm border" id="copySelectedRepoBtn"><i class="bi bi-files me-1"></i>Copy repo full name</button>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL: browser + editor -->
    <div class="col-lg-9">
      <!-- Controls card -->
      <div class="card shadow-sm border-0 mb-4">
        <div class="card-body bg-white">
          <div class="row g-3 align-items-end">
            <div class="col-md-5">
              <label class="form-label fw-semibold small text-secondary">Path <i class="bi bi-folder2-open"></i></label>
              <input id="pathInput" class="form-control form-control-sm" placeholder="(blank=root) e.g. src/">
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold small text-secondary">Branch / ref</label>
              <input id="branchInput" class="form-control form-control-sm" placeholder="e.g. main, dev">
            </div>
            <div class="col-md-2">
              <button id="browseBtn" class="btn btn-primary w-100 btn-sm"><i class="bi bi-search me-1"></i>Browse</button>
            </div>
            <div class="col-md-2">
              <button class="btn btn-outline-info w-100 btn-sm" id="rawLinkBtn" title="generate raw link for selected file"><i class="bi bi-file-earmark"></i> Raw</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Directory view card with copy/download -->
      <div class="card shadow-sm border-0 mb-4">
        <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center pt-3">
          <span class="fw-semibold"><i class="bi bi-diagram-2 me-1"></i>Contents</span>
          <span class="small text-secondary" id="folderStats"></span>
        </div>
        <div class="card-body">
          <div id="directoryView" class="directory-card bg-light p-3 rounded-3 border" style="max-height: 320px; overflow-y: auto;"></div>
          <!-- copy all files button (just demo wrapper) -->
          <div class="mt-2 d-flex gap-2 flex-wrap">
            <button class="btn btn-sm btn-outline-secondary" id="copyFolderListBtn" disabled><i class="bi bi-copy"></i> copy list (demo)</button>
          </div>
        </div>
      </div>

      <!-- Editor Panel -->
      <div id="editorPanel" class="card shadow-sm border-0" hidden>
        <div class="card-header bg-white py-3 d-flex flex-wrap align-items-center justify-content-between">
          <h5 id="fileTitle" class="mb-0 fw-semibold"><i class="bi bi-file-earmark-code me-1"></i> <span class="mono">file</span></h5>
          <div class="d-flex gap-2 mt-2 mt-sm-0">
            <button class="btn btn-sm btn-outline-dark" id="downloadFileBtn"><i class="bi bi-download"></i> Download</button>
            <button class="btn btn-sm btn-outline-secondary" id="copyRawContentBtn"><i class="bi bi-clipboard"></i> copy raw</button>
            <button class="btn btn-sm btn-outline-primary" id="rawFileLinkBtn"><i class="bi bi-link"></i> raw url</button>
          </div>
        </div>
        <div class="card-body p-0 p-md-2">
          <textarea id="editor" class="form-control border-0 rounded-0 mono" rows="12" spellcheck="false" placeholder="file content ..."></textarea>

          <div class="row g-2 p-3 align-items-center editor-footer">
            <div class="col-md-5">
              <input id="commitMsg" class="form-control form-control-sm" placeholder="commit message (optional)">
            </div>
            <div class="col-md-3">
              <button id="saveBtn" class="btn btn-success w-100 btn-sm"><i class="bi bi-check-circle"></i> Save</button>
            </div>
            <div class="col-md-2">
              <button id="deleteBtn" class="btn btn-danger w-100 btn-sm"><i class="bi bi-trash3"></i> Delete</button>
            </div>
            <div class="col-md-2">
              <button class="btn btn-outline-warning w-100 btn-sm" id="cancelEditorBtn" title="close editor"><i class="bi bi-x-circle"></i></button>
            </div>
          </div>

          <div class="px-3 pb-3 small">
            <span id="status" class="text-secondary fst-italic"></span>
          </div>
        </div>
      </div>

      <!-- hidden field to store current file raw url -->
      <div id="currentFileMeta" data-path="" data-sha="" data-repo="" data-owner=""></div>
    </div>
  </div>
</div>

<script>
(function() {
  // ---------- state ----------
  let page = 1;
  let selectedRepo = null;
  let currentFileSha = null;
  let owner = null;
  let currentFilePath = null;
  let currentFileContent = '';    // for copy/download
  let currentBranch = '';

  // DOM elements
  const repoSelect = document.getElementById('repoSelect');
  const prevBtn = document.getElementById('prevPage');
  const nextBtn = document.getElementById('nextPage');
  const pageLabel = document.getElementById('pageLabel');
  const browseBtn = document.getElementById('browseBtn');
  const pathInput = document.getElementById('pathInput');
  const branchInput = document.getElementById('branchInput');
  const directoryView = document.getElementById('directoryView');
  const editorPanel = document.getElementById('editorPanel');
  const fileTitle = document.getElementById('fileTitle');
  const editor = document.getElementById('editor');
  const commitMsg = document.getElementById('commitMsg');
  const saveBtn = document.getElementById('saveBtn');
  const deleteBtn = document.getElementById('deleteBtn');
  const statusDiv = document.getElementById('status');
  const copySelectedRepoBtn = document.getElementById('copySelectedRepoBtn');
  const copyQuickRepoBtn = document.getElementById('copyQuickRepoBtn');
  const quickRepoUrl = document.getElementById('quickRepoUrl');
  const refreshReposBtn = document.getElementById('refreshReposBtn');
  const rawLinkBtn = document.getElementById('rawLinkBtn');          // from browse row
  const downloadFileBtn = document.getElementById('downloadFileBtn');
  const copyRawContentBtn = document.getElementById('copyRawContentBtn');
  const rawFileLinkBtn = document.getElementById('rawFileLinkBtn');
  const cancelEditorBtn = document.getElementById('cancelEditorBtn');
  const folderStats = document.getElementById('folderStats');
  const copyFolderListBtn = document.getElementById('copyFolderListBtn');
  const currentFileMeta = document.getElementById('currentFileMeta');

  // helper fetch
  async function fetchJSON(url, opts = {}) {
    const r = await fetch(url, opts);
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }

  // load repos
  async function loadRepos() {
    pageLabel.textContent = `Page ${page}`;
    try {
      const repos = await fetchJSON(`/api/repos?page=${page}`);
      repoSelect.innerHTML = '';
      if (!repos.length) {
        const opt = document.createElement('option');
        opt.textContent = '— no repos —';
        repoSelect.appendChild(opt);
      } else {
        repos.forEach(repo => {
          const opt = document.createElement('option');
          opt.value = repo.name;
          opt.textContent = `${repo.full_name}`;
          opt.dataset.owner = repo.owner.login;
          repoSelect.appendChild(opt);
        });
      }
    } catch (e) {
      repoSelect.innerHTML = '<option>⚠️ error loading</option>';
    }
  }

  prevBtn.onclick = () => { if (page > 1) { page--; loadRepos(); } };
  nextBtn.onclick = () => { page++; loadRepos(); };
  refreshReposBtn.onclick = loadRepos;

  // select repo
  repoSelect.onchange = (e) => {
    const opt = e.target.selectedOptions[0];
    if (!opt || !opt.dataset.owner) return;
    selectedRepo = opt.value;
    owner = opt.dataset.owner;
    directoryView.innerHTML = '<div class="text-secondary">⬆️ browse to show contents</div>';
    editorPanel.hidden = true;
    // update meta
    currentFileMeta.dataset.repo = selectedRepo;
    currentFileMeta.dataset.owner = owner;
    statusDiv.textContent = '';
  };

  // copy selected repo full name (owner/repo)
  copySelectedRepoBtn.onclick = () => {
    if (!owner || !selectedRepo) { alert('select a repo first'); return; }
    const full = `${owner}/${selectedRepo}`;
    navigator.clipboard?.writeText(full).then(() => statusDiv.textContent = '✓ repo name copied').catch(() => alert('copy failed'));
  };

  copyQuickRepoBtn.onclick = () => {
    navigator.clipboard?.writeText(quickRepoUrl.value).then(() => statusDiv.textContent = '✓ quick repo copied').catch(() => {});
  };

  // ---------- browse ----------
  async function browse() {
    const path = pathInput.value.trim();
    const ref = branchInput.value.trim();
    if (!owner || !selectedRepo) { alert('select repository'); return; }
    currentBranch = ref; // store for raw links

    const qp = new URLSearchParams({ owner, repo: selectedRepo });
    if (path) qp.set('path', path);
    if (ref) qp.set('ref', ref);

    try {
      const items = await fetchJSON(`/api/contents?${qp.toString()}`);
      directoryView.innerHTML = '';
      const arr = Array.isArray(items) ? items : [items];
      folderStats.textContent = `${arr.length} item(s)`;

      // if it's a single file (maybe direct path) -> auto open?
      if (!Array.isArray(items) && items.type === 'file') {
        // open file automatically
        openFile(items.path);
        // also show in dir as link
        renderFileItems([items]);
      } else {
        renderFileItems(arr);
      }
    } catch (err) {
      directoryView.innerHTML = `<span class="text-danger">❌ error: ${err.message}</span>`;
    }
  }

  function renderFileItems(items) {
    const panel = directoryView;
    panel.innerHTML = '';

    items.forEach(it => {
      if (it.type === 'dir') {
        // folder: use details/summary bootstrap style
        const details = document.createElement('div');
        details.className = 'border rounded-3 mb-2 p-2 bg-white';
        const summary = document.createElement('div');
        summary.className = 'd-flex align-items-center folder-summary fw-semibold';
        summary.innerHTML = `<i class="bi bi-folder-fill text-warning me-2"></i>${it.path} `;
        summary.setAttribute('data-path', it.path);
        summary.style.cursor = 'pointer';

        const childContainer = document.createElement('div');
        childContainer.className = 'mt-2 ps-3 d-none';
        summary.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (!childContainer.classList.contains('d-none')) {
            childContainer.classList.add('d-none');
            return;
          }
          // fetch children
          try {
            const ref = branchInput.value.trim();
            const qp = new URLSearchParams({ owner, repo: selectedRepo, path: it.path });
            if (ref) qp.set('ref', ref);
            const sub = await fetchJSON(`/api/contents?${qp.toString()}`);
            const listDiv = document.createElement('div');
            listDiv.className = 'list-group list-group-flush small';
            (Array.isArray(sub) ? sub : [sub]).forEach(child => {
              const itemDiv = document.createElement('div');
              itemDiv.className = 'list-group-item d-flex align-items-center py-1 px-2 border-0 file-item';
              if (child.type === 'file') {
                itemDiv.innerHTML = `<i class="bi bi-file-earmark text-secondary me-2"></i><a href="#" class="text-decoration-none flex-grow-1">${child.name}</a>`;
                const a = itemDiv.querySelector('a');
                a.onclick = (ev) => { ev.preventDefault(); openFile(child.path); };
                // add inline copy raw link
                const rawBtn = document.createElement('button');
                rawBtn.className = 'btn btn-sm btn-link py-0 px-1';
                rawBtn.innerHTML = '<i class="bi bi-link-45deg"></i>';
                rawBtn.title = 'copy raw url';
                rawBtn.onclick = (e) => { e.stopPropagation(); copyRawUrlForPath(child.path); };
                itemDiv.appendChild(rawBtn);
              } else {
                itemDiv.innerHTML = `<i class="bi bi-folder text-warning me-2"></i>${child.path} (folder)`;
              }
              listDiv.appendChild(itemDiv);
            });
            childContainer.innerHTML = '';
            childContainer.appendChild(listDiv);
            childContainer.classList.remove('d-none');
          } catch (e) {
            childContainer.innerHTML = `<span class="text-danger">error</span>`;
            childContainer.classList.remove('d-none');
          }
        });
        details.appendChild(summary);
        details.appendChild(childContainer);
        panel.appendChild(details);
      } else if (it.type === 'file') {
        const fileRow = document.createElement('div');
        fileRow.className = 'd-flex align-items-center justify-content-between mb-1 p-1 bg-white rounded border file-item';
        fileRow.innerHTML = `<span><i class="bi bi-file-earmark-code me-2 text-primary"></i><a href="#" class="text-decoration-none">${it.path}</a></span>`;
        const btnGroup = document.createElement('span');
        btnGroup.className = 'btn-group btn-group-sm';

        const rawCopyBtn = document.createElement('button');
        rawCopyBtn.className = 'btn btn-outline-secondary border-0';
        rawCopyBtn.innerHTML = '<i class="bi bi-link"></i>';
        rawCopyBtn.title = 'copy raw url';
        rawCopyBtn.onclick = (e) => { e.stopPropagation(); copyRawUrlForPath(it.path); };

        const dlBtn = document.createElement('button');
        dlBtn.className = 'btn btn-outline-secondary border-0';
        dlBtn.innerHTML = '<i class="bi bi-download"></i>';
        dlBtn.title = 'download file';
        dlBtn.onclick = (e) => { e.stopPropagation(); triggerDownload(it.path); };

        btnGroup.appendChild(rawCopyBtn);
        btnGroup.appendChild(dlBtn);
        fileRow.appendChild(btnGroup);

        const link = fileRow.querySelector('a');
        link.onclick = (e) => { e.preventDefault(); openFile(it.path); };
        panel.appendChild(fileRow);
      }
    });
  }

  // helper: copy raw url for any file (without opening)
  function copyRawUrlForPath(filePath) {
    if (!owner || !selectedRepo) return;
    const ref = branchInput.value.trim() || 'main';
    const rawUrl = `https://raw.githubusercontent.com/${owner}/${selectedRepo}/${ref}/${filePath}`;
    navigator.clipboard?.writeText(rawUrl).then(() => statusDiv.textContent = '✓ raw url copied');
  }

  // trigger download by simulating raw fetch (just copies raw url actually, but we can later)
  function triggerDownload(filePath) {
    copyRawUrlForPath(filePath); // for simplicity just copy raw url to clipboard and notify
    statusDiv.textContent = 'raw url copied, use to download';
  }

  // open file
  async function openFile(path) {
    const ref = branchInput.value.trim();
    const qp = new URLSearchParams({ owner, repo: selectedRepo, path });
    if (ref) qp.set('ref', ref);
    try {
      const file = await fetchJSON(`/api/file?${qp.toString()}`);
      currentFileSha = file.sha;
      currentFilePath = path;
      currentFileContent = file.content || '';
      fileTitle.innerHTML = `<i class="bi bi-file-earmark"></i> ${path}`;
      editor.value = currentFileContent;
      editorPanel.hidden = false;
      statusDiv.textContent = '';

      // update meta dataset
      currentFileMeta.dataset.path = path;
      currentFileMeta.dataset.sha = file.sha;
    } catch (e) {
      alert('cannot open file: ' + e.message);
    }
  }

  // save file
  async function saveFile() {
    const content = editor.value;
    const message = commitMsg.value.trim() || `Update ${currentFilePath}`;
    const branch = branchInput.value.trim();

    const body = { owner, repo: selectedRepo, path: currentFilePath, content, message };
    if (currentFileSha) body.sha = currentFileSha;
    if (branch) body.branch = branch;

    try {
      const resp = await fetchJSON('/api/save', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      statusDiv.innerHTML = `<span class="text-success">✅ Saved. commit: ${resp.commit?.sha?.substring(0,7) || ''}</span>`;
      currentFileSha = resp.content?.sha || currentFileSha;
    } catch (err) {
      statusDiv.innerHTML = `<span class="text-danger">❌ save failed: ${err.message}</span>`;
    }
  }

  // delete file
  async function delFile() {
    if (!confirm(`Delete ${currentFilePath} ?`)) return;
    const message = commitMsg.value.trim() || `Delete ${currentFilePath}`;
    try {
      const resp = await fetchJSON('/api/delete', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ owner, repo: selectedRepo, path: currentFilePath, sha: currentFileSha, message })
      });
      statusDiv.innerHTML = `<span class="text-success">🗑️ Deleted commit ${resp.commit?.sha?.substring(0,7) || ''}</span>`;
      editorPanel.hidden = true;
    } catch (err) {
      statusDiv.innerHTML = `<span class="text-danger">delete error: ${err.message}</span>`;
    }
  }

  // raw link button (for current selected file in editor)
  rawFileLinkBtn.onclick = () => {
    if (!owner || !selectedRepo || !currentFilePath) { alert('no file open'); return; }
    const ref = branchInput.value.trim() || 'main';
    const rawUrl = `https://raw.githubusercontent.com/${owner}/${selectedRepo}/${ref}/${currentFilePath}`;
    navigator.clipboard?.writeText(rawUrl).then(() => statusDiv.textContent = '✓ raw url copied (editor)');
  };

  // raw link from browse row (uses path input? we can use current selection)
  rawLinkBtn.onclick = () => {
    if (!owner || !selectedRepo) { alert('select repo'); return; }
    const path = pathInput.value.trim() || '';
    if (!path) { alert('enter a file path in the path field'); return; }
    const ref = branchInput.value.trim() || 'main';
    const rawUrl = `https://raw.githubusercontent.com/${owner}/${selectedRepo}/${ref}/${path}`;
    navigator.clipboard?.writeText(rawUrl).then(() => statusDiv.textContent = '✓ raw url from path copied');
  };

  // download file (from editor) -> copy raw url, but we can also offer
  downloadFileBtn.onclick = () => {
    if (!currentFilePath) return;
    copyRawUrlForPath(currentFilePath);
    statusDiv.textContent = 'raw url copied (use to download)';
  };

  // copy raw content from editor
  copyRawContentBtn.onclick = () => {
    navigator.clipboard?.writeText(editor.value).then(() => statusDiv.textContent = '✓ file content copied');
  };

  // cancel editor
  cancelEditorBtn.onclick = () => {
    editorPanel.hidden = true;
    statusDiv.textContent = '';
  };

  // attach main actions
  browseBtn.onclick = browse;
  saveBtn.onclick = saveFile;
  deleteBtn.onclick = delFile;

  // copy folder list (demo)
  copyFolderListBtn.onclick = () => {
    statusDiv.textContent = 'demo: folder list copy';
  };

  // initial load
  loadRepos();
})();
</script>

<!-- optional: include bootstrap JS for proper toggles (not strictly needed) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
