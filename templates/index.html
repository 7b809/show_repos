<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>GitHub Repo Editor</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<body class="bg-light">

<div class="container-fluid py-4">
  <div class="row shadow rounded bg-white overflow-hidden">

    <!-- LEFT PANEL -->
    <aside class="col-md-3 border-end p-4 bg-white">
      <h4 class="mb-3 text-primary">Repositories</h4>

      <!-- 🆕 CREATE REPO -->
      <div class="mb-3">
        <input id="newRepoName" class="form-control mb-2" placeholder="New repo name">
        <button id="createRepoBtn" class="btn btn-success btn-sm w-100">
          Create Repo
        </button>
      </div>

      <select id="repoSelect" size="12" class="form-select mb-3"></select>

      <div class="d-flex justify-content-between align-items-center">
        <button id="prevPage" class="btn btn-outline-secondary btn-sm">Prev</button>
        <span id="pageLabel" class="fw-bold"></span>
        <button id="nextPage" class="btn btn-outline-secondary btn-sm">Next</button>
      </div>
    </aside>

    <!-- RIGHT PANEL -->
    <main class="col-md-9 p-4">

      <!-- Controls -->
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <div class="row g-3 align-items-end">

            <div class="col-md-5">
              <label class="form-label">Path</label>
              <input id="pathInput" class="form-control"
                     placeholder="(blank)=root or e.g. src/" />
            </div>

            <div class="col-md-3">
              <label class="form-label">Branch</label>
              <input id="branchInput" class="form-control"
                     placeholder="(optional) e.g. main" />
            </div>

            <div class="col-md-2">
              <button id="browseBtn" class="btn btn-primary w-100">
                Browse
              </button>
            </div>

          </div>

          <!-- 🆕 Folder + Branch Actions -->
          <div class="row g-3 mt-3">

            <div class="col-md-4">
              <input id="newFolderName" class="form-control"
                     placeholder="Folder name (e.g. src/components)">
            </div>
            <div class="col-md-2">
              <button id="createFolderBtn" class="btn btn-warning w-100">
                Create Folder
              </button>
            </div>

            <div class="col-md-4">
              <input id="newBranchName" class="form-control"
                     placeholder="New branch name">
            </div>
            <div class="col-md-2">
              <button id="createBranchBtn" class="btn btn-info w-100">
                Create Branch
              </button>
            </div>

          </div>
        </div>
      </div>

      <!-- Directory View -->
      <div id="directoryView" class="card shadow-sm mb-4 p-3 bg-light rounded"></div>

      <!-- Editor Panel (UNCHANGED) -->
      <div id="editorPanel" class="card shadow-sm" hidden>
        <div class="card-header bg-primary text-white">
          <h5 id="fileTitle" class="mb-0"></h5>
        </div>

        <div class="card-body">
          <textarea id="editor"
                    class="form-control mb-3"
                    rows="15"
                    spellcheck="false"
                    style="font-family: monospace;"></textarea>

          <div class="row g-2 align-items-center">
            <div class="col-md-6">
              <input id="commitMsg"
                     class="form-control"
                     placeholder="Commit message" />
            </div>

            <div class="col-md-3">
              <button id="saveBtn" class="btn btn-success w-100">
                Save
              </button>
            </div>

            <div class="col-md-3">
              <button id="deleteBtn" class="btn btn-danger w-100">
                Delete
              </button>
            </div>
          </div>

          <div class="mt-3">
            <small id="status" class="text-muted"></small>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>


<script>
let page = 1, selectedRepo = null, currentFileSha = null, owner = null;

async function fetchJSON(url, opts={}) {
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

/* ===========================
   EXISTING CODE (UNCHANGED)
=========================== */

async function loadRepos() {
  document.getElementById('pageLabel').textContent = `Page ${page}`;
  const repos = await fetchJSON(`/api/repos?page=${page}`);
  const el = document.getElementById('repoSelect');
  el.innerHTML = '';
  repos.forEach(repo => {
    const opt = document.createElement('option');
    opt.value = repo.name;
    opt.textContent = `${repo.full_name}`;
    opt.dataset.owner = repo.owner.login;
    el.appendChild(opt);
  });
}

document.getElementById('prevPage').onclick = () => { if (page>1){page--; loadRepos();}};
document.getElementById('nextPage').onclick = () => { page++; loadRepos();};

document.getElementById('repoSelect').onchange = (e) => {
  const opt = e.target.selectedOptions[0];
  if (!opt) return;
  selectedRepo = opt.value;
  owner = opt.dataset.owner;
  document.getElementById('directoryView').innerHTML = '';
  document.getElementById('editorPanel').hidden = true;
};

/* ===========================
   🆕 NEW FEATURES
=========================== */

// Create Repo
document.getElementById("createRepoBtn").onclick = async () => {
  const name = document.getElementById("newRepoName").value.trim();
  if (!name) return alert("Enter repo name");

  await fetchJSON("/api/create-repo", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name })
  });

  alert("Repository created!");
  document.getElementById("newRepoName").value = "";
  loadRepos();
};

// Create Folder
document.getElementById("createFolderBtn").onclick = async () => {
  const folder = document.getElementById("newFolderName").value.trim();
  const branch = document.getElementById("branchInput").value.trim();
  if (!folder) return alert("Enter folder name");
  if (!owner || !selectedRepo) return alert("Select repo first");

  await fetchJSON("/api/create-folder", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ owner, repo: selectedRepo, folder, branch })
  });

  alert("Folder created!");
  document.getElementById("newFolderName").value = "";
};

// Create Branch
document.getElementById("createBranchBtn").onclick = async () => {
  const new_branch = document.getElementById("newBranchName").value.trim();
  if (!new_branch) return alert("Enter branch name");
  if (!owner || !selectedRepo) return alert("Select repo first");

  await fetchJSON("/api/create-branch", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ owner, repo: selectedRepo, new_branch })
  });

  alert("Branch created!");
  document.getElementById("newBranchName").value = "";
};

loadRepos();
</script>

</body>
</html>
