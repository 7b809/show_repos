<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>GitHub Repo Editor</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<body class="bg-light">

<div class="container-fluid py-4">
  <div class="row shadow rounded bg-white overflow-hidden">

    <!-- LEFT PANEL -->
    <aside class="col-md-3 border-end p-4 bg-white">
      <h4 class="mb-3 text-primary">Repositories</h4>

      <select id="repoSelect" size="12" class="form-select mb-3"></select>

      <div class="d-flex justify-content-between align-items-center">
        <button id="prevPage" class="btn btn-outline-secondary btn-sm">Prev</button>
        <span id="pageLabel" class="fw-bold"></span>
        <button id="nextPage" class="btn btn-outline-secondary btn-sm">Next</button>
      </div>
    </aside>

    <!-- RIGHT PANEL -->
    <main class="col-md-9 p-4">

      <!-- Controls -->
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <div class="row g-3 align-items-end">

            <div class="col-md-5">
              <label class="form-label">Path</label>
              <input id="pathInput" class="form-control"
                     placeholder="(blank)=root or e.g. src/" />
            </div>

            <div class="col-md-3">
              <label class="form-label">Branch</label>
              <input id="branchInput" class="form-control"
                     placeholder="(optional) e.g. main" />
            </div>

            <div class="col-md-2">
              <button id="browseBtn" class="btn btn-primary w-100">
                Browse
              </button>
            </div>

          </div>
        </div>
      </div>

      <!-- Directory View -->
      <div id="directoryView" class="card shadow-sm mb-4 p-3 bg-light rounded"></div>

      <!-- Editor Panel -->
      <div id="editorPanel" class="card shadow-sm" hidden>
        <div class="card-header bg-primary text-white">
          <h5 id="fileTitle" class="mb-0"></h5>
        </div>

        <div class="card-body">
          <textarea id="editor"
                    class="form-control mb-3"
                    rows="15"
                    spellcheck="false"
                    style="font-family: monospace;"></textarea>

          <div class="row g-2 align-items-center">
            <div class="col-md-6">
              <input id="commitMsg"
                     class="form-control"
                     placeholder="Commit message" />
            </div>

            <div class="col-md-3">
              <button id="saveBtn" class="btn btn-success w-100">
                Save
              </button>
            </div>

            <div class="col-md-3">
              <button id="deleteBtn" class="btn btn-danger w-100">
                Delete
              </button>
            </div>
          </div>

          <div class="mt-3">
            <small id="status" class="text-muted"></small>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>


<script>
let page = 1, selectedRepo = null, currentFileSha = null, owner = null;

async function fetchJSON(url, opts={}) {
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function loadRepos() {
  document.getElementById('pageLabel').textContent = `Page ${page}`;
  const repos = await fetchJSON(`/api/repos?page=${page}`);
  const el = document.getElementById('repoSelect');
  el.innerHTML = '';
  repos.forEach(repo => {
    const opt = document.createElement('option');
    opt.value = repo.name;
    opt.textContent = `${repo.full_name}`;
    opt.dataset.owner = repo.owner.login;
    el.appendChild(opt);
  });
}

document.getElementById('prevPage').onclick = () => { if (page>1){page--; loadRepos();}};
document.getElementById('nextPage').onclick = () => { page++; loadRepos();};

document.getElementById('repoSelect').onchange = (e) => {
  const opt = e.target.selectedOptions[0];
  if (!opt) return;
  selectedRepo = opt.value;
  owner = opt.dataset.owner;
  document.getElementById('directoryView').innerHTML = '';
  document.getElementById('editorPanel').hidden = true;
};

async function browse() {
  const path = document.getElementById('pathInput').value.trim();
  const ref = document.getElementById('branchInput').value.trim();
  if (!owner || !selectedRepo) return alert('Select a repository first.');

  const qp = new URLSearchParams({ owner, repo: selectedRepo });
  if (path) qp.set('path', path);
  if (ref) qp.set('ref', ref);

  const items = await fetchJSON(`/api/contents?${qp.toString()}`);
  const panel = document.getElementById('directoryView');
  panel.innerHTML = '';

  const arr = Array.isArray(items) ? items : [items];
  arr.forEach(it => {
    if (it.type === 'dir') {
      const details = document.createElement('details');
      details.classList.add("mb-2");

      const summary = document.createElement('summary');
      summary.textContent = `📁 ${it.path}`;
      summary.classList.add("fw-bold");
      details.appendChild(summary);

      summary.onclick = async () => {
        const sub = await fetchJSON(`/api/contents?owner=${owner}&repo=${selectedRepo}&path=${encodeURIComponent(it.path)}${ref?`&ref=${encodeURIComponent(ref)}`:''}`);
        const list = document.createElement('ul');
        list.classList.add("list-group", "mt-2");

        (Array.isArray(sub)?sub:[sub]).forEach(child => {
          const li = document.createElement('li');
          li.classList.add("list-group-item");

          if (child.type === 'file') {
            const a = document.createElement('a');
            a.href = '#';
            a.textContent = `📝 ${child.name}`;
            a.onclick = () => openFile(child.path);
            li.appendChild(a);
          } else {
            li.textContent = `📁 ${child.path}`;
          }
          list.appendChild(li);
        });
        details.replaceChildren(summary, list);
      };

      panel.appendChild(details);
    } else if (it.type === 'file') {
      const a = document.createElement('a');
      a.href = '#';
      a.classList.add("d-block", "mb-1");
      a.textContent = `📝 ${it.path}`;
      a.onclick = () => openFile(it.path);
      panel.appendChild(a);
    }
  });
}

async function openFile(path) {
  const ref = document.getElementById('branchInput').value.trim();
  const qp = new URLSearchParams({ owner, repo: selectedRepo, path });
  if (ref) qp.set('ref', ref);

  const file = await fetchJSON(`/api/file?${qp.toString()}`);
  currentFileSha = file.sha;
  document.getElementById('fileTitle').textContent = `${path}`;
  document.getElementById('editor').value = file.content || '';
  document.getElementById('editorPanel').hidden = false;
  document.getElementById('status').textContent = '';
  document.getElementById('deleteBtn').onclick = () => delFile(path);
  document.getElementById('saveBtn').onclick = () => saveFile(path);
}

async function saveFile(path) {
  const content = document.getElementById('editor').value;
  const message = document.getElementById('commitMsg').value || `Update ${path}`;
  const branch = document.getElementById('branchInput').value.trim();

  const body = { owner, repo: selectedRepo, path, content, message };
  if (currentFileSha) body.sha = currentFileSha;
  if (branch) body.branch = branch;

  const resp = await fetchJSON(`/api/save`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  document.getElementById('status').textContent = `Saved: ${resp.commit && resp.commit.sha ? resp.commit.sha : ''}`;
  currentFileSha = resp.content && resp.content.sha ? resp.content.sha : currentFileSha;
}

async function delFile(path) {
  if (!confirm(`Delete ${path}?`)) return;
  const message = document.getElementById('commitMsg').value || `Delete ${path}`;
  const resp = await fetchJSON(`/api/delete`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ owner, repo: selectedRepo, path, sha: currentFileSha, message })
  });
  document.getElementById('status').textContent = `Deleted in commit ${resp.commit && resp.commit.sha ? resp.commit.sha : ''}`;
}

document.getElementById('browseBtn').onclick = browse;
loadRepos();
</script>

</body>
</html>
